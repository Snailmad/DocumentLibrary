[custom]
# --- 规则集设定 (优先级由高到低) ---
# 0. 指定代理 & 手动直连补丁
# 注意：由于 Direct.list 是纯文本，去掉 clash-classic: 前缀改用普通 list 模式
ruleset=🎯 无墙直连,https://raw.githubusercontent.com/Snailmad/DocumentLibrary/refs/heads/main/OpenClash/rule/Direct.list,28800
ruleset=🚀 爬墙代理,[]DOMAIN-SUFFIX,xiaoyakankan.com
ruleset=🚀 爬墙代理,[]DOMAIN-SUFFIX,hanime1.me
ruleset=🚀 爬墙代理,[]DOMAIN-SUFFIX,xhamster.com
ruleset=🚀 爬墙代理,[]DOMAIN-SUFFIX,cosplaytele.com
# Telegram 推荐使用专门的 Clash YAML 格式链接，确保兼容性
ruleset=🚀 爬墙代理,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml,86400

# 1. 基础私有网络与本地绕过
ruleset=🎯 无墙直连,[]GEOSITE,private
ruleset=🎯 无墙直连,[]GEOIP,private,no-resolve

# 2. 核心 AI 与 社交 (对 IP 敏感，放前面)
ruleset=🚀 爬墙代理,[]GEOSITE,openai
ruleset=🚀 爬墙代理,[]GEOSITE,category-ai-!cn
ruleset=🚀 爬墙代理,[]GEOSITE,category-communication
ruleset=🚀 爬墙代理,[]GEOSITE,category-social-media-!cn

# 3. 开发者与媒体
ruleset=🚀 爬墙代理,[]GEOSITE,github
ruleset=🚀 爬墙代理,[]GEOSITE,youtube
ruleset=🚀 爬墙代理,[]GEOSITE,google

# 4. 游戏加速 (CDN 强制直连放在商店逻辑前)
ruleset=🎯 无墙直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
# 如果 steam.list 也是纯文本，请去掉下面的 clash-classic: 前缀
ruleset=🎮 steam游戏,https://raw.githubusercontent.com/Snailmad/DocumentLibrary/refs/heads/main/OpenClash/rule/steam.list,86400

# 5. 国内直连优化
ruleset=🎯 无墙直连,[]GEOSITE,google-cn
ruleset=🎯 无墙直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 无墙直连,[]GEOSITE,category-public-tracker
ruleset=🎯 无墙直连,[]GEOSITE,CN
ruleset=🎯 无墙直连,[]GEOIP,CN,no-resolve

# 6. 其他国外流量
ruleset=🚀 爬墙代理,[]GEOSITE,geolocation-!cn
ruleset=🐟 漏网之鱼,[]FINAL

# --- 业务策略组 ---
custom_proxy_group=🎯 无墙直连`select`[]DIRECT`[]🌐 全部自动`[]🇭🇰 香港自动`[]🇯🇵 日本自动`[]🇸🇬 新加坡自动`[]🇹🇼 台湾自动
custom_proxy_group=🚀 爬墙代理`select`[]🐸 手动切换`[]🌐 全部自动`[]🇭🇰 香港自动`[]🇯🇵 日本自动`[]🇸🇬 新加坡自动`[]🇹🇼 台湾自动`[]DIRECT
custom_proxy_group=🎮 steam游戏`select`[]DIRECT`[]🌐 全部自动`[]🇭🇰 香港自动`[]🇯🇵 日本自动`[]🇸🇬 新加坡自动`[]🇹🇼 台湾自动
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🌐 全部自动`[]🇭🇰 香港自动`[]🇯🇵 日本自动`[]🇸🇬 新加坡自动`[]🇹🇼 台湾自动

# --- 基础节点池 & 自动选择 ---
custom_proxy_group=🐸 手动切换`select`.*
custom_proxy_group=🇭🇰 香港自动`url-test`.*(香港|HK|Hong Kong|🇭🇰|HongKong)`https://www.google.com/generate_204`60
custom_proxy_group=🇯🇵 日本自动`url-test`.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)`https://www.google.com/generate_204`60
custom_proxy_group=🇸🇬 新加坡自动`url-test`.*(新加坡|坡|狮城|SG|Singapore)`https://www.google.com/generate_204`60
custom_proxy_group=🇹🇼 台湾自动`url-test`.*(台湾|台|新北|彰化|TW|Taiwan)`https://www.google.com/generate_204`60
custom_proxy_group=🌐 全部自动`url-test`^.*`https://www.google.com/generate_204`60

enable_rule_generator=true
overwrite_original_rules=true
