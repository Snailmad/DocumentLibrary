[custom]
# --- 规则集设定 (优先级由高到低) ---
# 1. 基础私有网络与本地绕过
ruleset=🎯 无墙直连,[]GEOSITE,private
ruleset=🎯 无墙直连,[]GEOIP,private,no-resolve

# 2. 核心 AI 与 社交 (对 IP 敏感，放前面)
ruleset=🚀 爬墙代理,[]GEOSITE,openai
ruleset=🚀 爬墙代理,[]GEOSITE,category-ai-!cn
ruleset=🚀 爬墙代理,[]GEOSITE,category-communication
ruleset=🚀 爬墙代理,[]GEOSITE,category-social-media-!cn

# 3. 开发者与媒体
ruleset=🚀 爬墙代理,[]GEOSITE,github
ruleset=🚀 爬墙代理,[]GEOSITE,youtube
ruleset=🚀 爬墙代理,[]GEOSITE,google

# 4. 游戏加速 (Steam 建议放在直连前)
ruleset=🎮 steam游戏,https://raw.githubusercontent.com/Snailmad/DocumentLibrary/refs/heads/main/OpenClash/rule/steam.list
ruleset=🎯 无墙直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800

# 5. 国内直连优化 (包含微软和国内常用域名)
ruleset=🎯 无墙直连,[]GEOSITE,microsoft
ruleset=🎯 无墙直连,[]GEOSITE,google-cn
ruleset=🎯 无墙直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 无墙直连,[]GEOSITE,category-public-tracker
ruleset=🎯 无墙直连,[]GEOSITE,CN
ruleset=🎯 无墙直连,[]GEOIP,CN,no-resolve

# 6. 其他国外流量
ruleset=🚀 爬墙代理,[]GEOSITE,geolocation-!cn
ruleset=🐟 漏网之鱼,[]FINAL

# --- 业务策略组 ---
# 直连组：默认 DIRECT，备选代理（防止某些特殊国内域名打不开）
custom_proxy_group=🎯 无墙直连`select`[]DIRECT`[]🚀 爬墙代理
# 业务组
custom_proxy_group=🚀 爬墙代理`select`[]🌐 全部自动`[]🇭🇰 香港自动`[]🇯🇵 日本自动`[]🇸🇬 新加坡自动`[]🇹🇼 台湾自动`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🎮 steam游戏`select`[]DIRECT`[]🌐 全部自动`[]🐸 手动切换
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 爬墙代理`[]DIRECT

# --- 区域自动选择 (url-test) ---
# 延迟测试地址建议统一，60s 间隔适中
custom_proxy_group=🇭🇰 香港自动`url-test`.*(香港|HK|Hong Kong|🇭🇰|HongKong)`http://www.gstatic.com/generate_204`60
custom_proxy_group=🇯🇵 日本自动`url-test`.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)`http://www.gstatic.com/generate_204`60
custom_proxy_group=🇸🇬 新加坡自动`url-test`.*(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`60
custom_proxy_group=🇹🇼 台湾自动`url-test`.*(台湾|台|新北|彰化|TW|Taiwan)`http://www.gstatic.com/generate_204`60
custom_proxy_group=🌐 全部自动`url-test`^.*`http://www.gstatic.com/generate_204`60

# --- 基础节点池 ---
custom_proxy_group=🐸 手动切换`select`.*

enable_rule_generator=true
overwrite_original_rules=true
